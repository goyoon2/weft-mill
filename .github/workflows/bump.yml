name: bump-catalog

# Rebuild ONE harness at its newest upstream version on a clean runner and open a PR carrying the
# result (index.json + that harness's spools). Dispatched once per drifted harness by livecheck.yml,
# or manually for an ad-hoc bump. The PR is the human gate: reviewing + merging publishes the new
# version into the catalog. The actual rebuild runs the real upstream installer in CI (CI=true
# enforces the machine-path portability gate), so the PR diff reflects exactly what got built.
on:
  workflow_dispatch:
    inputs:
      id:
        description: "Harness id to bump (e.g. gsd-core)"
        required: true
        type: string
      version:
        description: "Expected upstream version (informational — the build resolves `latest` itself)"
        required: false
        type: string

permissions:
  contents: write # push the bump branch
  pull-requests: write # open / update the PR

concurrency:
  group: bump-${{ inputs.id }}
  cancel-in-progress: true

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      # Same side-by-side layout as build.yml / livecheck.yml: the build engine lives in the sibling
      # weft repo, so the two checkouts must sit next to each other under the workspace.
      - name: Checkout weft-mill
        uses: actions/checkout@v4
        with:
          path: weft-mill

      - name: Checkout weft (engine — provides @weft/loom + @weft/schema)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/weft
          ref: main
          path: weft
          token: ${{ github.token }}

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: weft/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            weft/pnpm-lock.yaml
            weft-mill/pnpm-lock.yaml

      - name: Install engine deps
        run: pnpm install --frozen-lockfile
        working-directory: weft
      - name: Install mill deps
        run: pnpm install --frozen-lockfile
        working-directory: weft-mill

      # Rebuild ONLY the targeted harness. Every other harness is reused from the committed spools in
      # this checkout, so their index.json entries stay byte-identical → a clean, single-harness diff.
      - name: Rebuild ${{ inputs.id }} at latest upstream
        run: pnpm build
        working-directory: weft-mill
        env:
          WEFT_BUILD_ONLY: ${{ inputs.id }}

      # Diff committed vs rebuilt catalog → consistent PR body + resolved version/branch.
      - name: Render PR body + resolve version
        id: render
        run: pnpm render-bump-pr "${{ inputs.id }}"
        working-directory: weft-mill

      - name: Open / update the bump PR
        uses: peter-evans/create-pull-request@v6
        with:
          path: weft-mill
          base: main
          branch: ${{ steps.render.outputs.branch }}
          delete-branch: true
          # Commit ONLY this harness's catalog data, so an unrelated change can never ride along.
          add-paths: |
            index.json
            spools/${{ inputs.id }}/**
          commit-message: "chore(catalog): bump ${{ inputs.id }} to ${{ steps.render.outputs.version }}"
          title: "chore(catalog): bump ${{ inputs.id }} to ${{ steps.render.outputs.version }}"
          body-path: weft-mill/pr-body.md
          labels: |
            livecheck
            catalog
            automated
