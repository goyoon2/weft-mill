name: build-catalog

# Rebuild the weft catalog (index.json + spools) in CI. This is the INTENDED home for `captured`
# builds: the untrusted upstream installers run on a clean, isolated runner — never a dev machine —
# and GitHub Actions sets CI=true automatically, so scripts/build.ts FAILS the build if any captured
# spool still carries a build-machine absolute path (a portability leak). Captures need network
# (each runs the harness's own `npx` installer), so this job talks to the npm registry.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # weft-mill depends on the sibling engine repo via `link:../weft/...`, so the two must sit
      # side by side under the workspace: <workspace>/weft-mill and <workspace>/weft.
      - name: Checkout weft-mill
        uses: actions/checkout@v4
        with:
          path: weft-mill

      - name: Checkout weft (engine — provides @weft/loom + @weft/schema)
        uses: actions/checkout@v4
        with:
          # Adjust if the engine repo is owned/named differently. For a PRIVATE engine repo in another
          # repo, replace github.token with a PAT secret that can read it (e.g. secrets.WEFT_REPO_TOKEN).
          repository: ${{ github.repository_owner }}/weft
          ref: main
          path: weft
          token: ${{ github.token }}

      - uses: pnpm/action-setup@v4 # reads packageManager from package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            weft/pnpm-lock.yaml
            weft-mill/pnpm-lock.yaml

      - name: Install engine deps
        run: pnpm install --frozen-lockfile
        working-directory: weft

      - name: Install mill deps
        run: pnpm install --frozen-lockfile
        working-directory: weft-mill

      - name: Build catalog (captures run here; CI fails the build on any machine-path leak)
        run: pnpm build
        working-directory: weft-mill

      - name: Upload built catalog
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weft-catalog
          path: |
            weft-mill/index.json
            weft-mill/spools/**
