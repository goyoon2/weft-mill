name: build-catalog

# Rebuild the weft catalog (index.json + spools) in CI — the intended home for `captured` builds:
# untrusted upstream installers run on a clean, isolated runner, and CI=true makes the build fail
# on any machine-path leak (portability gate).
#
# Scaling (A/C/F/B):
#  - A: only runs when patterns/scripts/this-workflow change (not on every push).
#  - C: scripts/build.ts builds patterns in parallel (isolated child processes).
#  - F: one pattern failing doesn't abort the rest; the build still fails (red) at the end.
#  - B: the GitHub Actions cache of `spools/` is the "fridge" — unchanged patterns are reused from
#       it (hashed by yaml), so only the changed pattern(s) rebuild. A scheduled/manual run with
#       WEFT_BUILD_ALL=1 does a full rebuild to pick up `track: latest` upstream version drift.
on:
  push:
    paths: [patterns/**, scripts/**, .github/workflows/build.yml]
  pull_request:
    paths: [patterns/**, scripts/**, .github/workflows/build.yml]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — full rebuild to catch upstream `latest` bumps
  workflow_dispatch:
    inputs:
      force_all:
        description: "Rebuild every pattern from scratch (ignore the cache)"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # weft-mill depends on the sibling engine repo via `link:../weft/...`, so the two must sit
      # side by side under the workspace: <workspace>/weft-mill and <workspace>/weft.
      - name: Checkout weft-mill
        uses: actions/checkout@v4
        with:
          path: weft-mill

      - name: Checkout weft (engine — provides @weft/loom + @weft/schema)
        uses: actions/checkout@v4
        with:
          # Adjust if the engine repo is owned/named differently. For a PRIVATE engine repo in another
          # repo, replace github.token with a PAT secret that can read it (e.g. secrets.WEFT_REPO_TOKEN).
          repository: ${{ github.repository_owner }}/weft
          ref: main
          path: weft
          token: ${{ github.token }}

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: weft/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # build.ts uses node:fs.globSync (Node 22+); 20 lacks it
          cache: pnpm
          cache-dependency-path: |
            weft/pnpm-lock.yaml
            weft-mill/pnpm-lock.yaml

      - name: Install engine deps
        run: pnpm install --frozen-lockfile
        working-directory: weft

      - name: Install mill deps
        run: pnpm install --frozen-lockfile
        working-directory: weft-mill

      # The "fridge": restore previously-built spools so unchanged patterns are reused. Rolling key
      # (unique per run) always saves a fresh snapshot; restore-keys pulls the most recent prior one.
      - name: Restore spool cache
        if: ${{ !inputs.force_all }}
        uses: actions/cache@v4
        with:
          path: weft-mill/spools
          key: mill-spools-${{ github.run_id }}
          restore-keys: mill-spools-

      - name: Build catalog (parallel + incremental; CI fails on any machine-path leak)
        run: pnpm build
        working-directory: weft-mill
        env:
          # Full rebuild on the weekly schedule or a manual force (picks up `track: latest` drift).
          WEFT_BUILD_ALL: ${{ (github.event_name == 'schedule' || inputs.force_all) && '1' || '' }}

      - name: Upload built catalog
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weft-catalog
          path: |
            weft-mill/index.json
            weft-mill/spools/**
