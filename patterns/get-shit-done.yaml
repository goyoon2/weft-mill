schema: 1
id: get-shit-done
displayName: Get Shit Done (GSD)
description: A meta-prompting, context-engineering and spec-driven development system for AI coding agents (agents, skills, commands, hooks, statusline) by TÂCHES.
homepage: https://github.com/gsd-build/get-shit-done
keywords:
  - gsd
  - spec-driven
  - context-engineering
  - meta-prompting
  - workflow
  - hooks

source:
  type: npm
  package: "get-shit-done-cc"

versioning:
  strategy: semver
  track: latest

# No `livecheck:` block — DERIVED from the npm source (npm-dist-tag): the daily livecheck reads the
# `latest` dist-tag of get-shit-done-cc and flags drift vs the built catalog. (The repo's package.json
# carries an in-dev canary version; npm `latest` is the published release the build resolves.)

# Every artifact is already `gsd-*`-prefixed, so keep names as-is; weft only namespaces a genuine
# cross-harness collision at install time.
namespace:
  mode: as-is

# Archetype A (captured). get-shit-done ships its own `bin/install.js` that, per `--<cli> {scopeFlag}`,
# rewrites content at install time (gsd:→gsd- command-name flattening, per-runtime frontmatter, hook
# command projection with absolute paths, a `gsd-sdk` it builds, plus its own bookkeeping files —
# gsd-install-state.json / gsd-file-manifest.json). Hand-mapping that is a lossy re-implementation, so
# we run the real installer once in a sandbox per target and snapshot exactly what it produced. Verified
# by real install (HOME=sandbox): each runtime writes a single config dir matching the adapter's
# payloadBase; the only re-localization weft applies is the sandbox config path + the absolute node
# path baked into hook commands (both handled automatically). Opencode `--global` also drops a `~/.gsd`
# defaults dir OUTSIDE the captured tree — surfaced as a build note, not shipped.
targets:
  claude-code:
    strategy: captured
    capture:
      installCmd: "npx -y {pkg}@{version} --claude {scopeFlag}"
      configDir: ".claude"

  codex:
    strategy: captured
    capture:
      installCmd: "npx -y {pkg}@{version} --codex {scopeFlag}"
      configDir: ".codex"

  gemini:
    strategy: captured
    capture:
      installCmd: "npx -y {pkg}@{version} --gemini {scopeFlag}"
      configDir: ".gemini"

  opencode:
    strategy: captured
    capture:
      installCmd: "npx -y {pkg}@{version} --opencode {scopeFlag}"
      # opencode targets different dirs per scope (XDG global vs project-local) — same split as gsd-core.
      configDir:
        global: ".config/opencode"
        local: ".opencode"

  cursor:
    strategy: captured
    capture:
      installCmd: "npx -y {pkg}@{version} --cursor {scopeFlag}"
      configDir: ".cursor"
